name: Claude PR Review
on:
  pull_request:
    types: [opened, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  review:
    # No authorization gate — this repo doesn't require review permission, so the
    # action runs on any PR (and on any issue comment that mentions @claude).
    # (The services version gates on the author's push permission; that job is
    # intentionally dropped here.)
    if: >
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '@claude')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Full history lets the action compute an accurate diff vs. the base branch.
          fetch-depth: 0

      - uses: anthropics/claude-code-action@558b1d6cab4085c7753fe402c10bef0fbb92ac7a # v1.0.165
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          track_progress: true
          claude_args: |
            --model claude-opus-4-8
            --max-turns 30
            --allowedTools "mcp__github_inline_comment__create_inline_comment"
          prompt: |
            Review this PR. For each issue, post an INLINE comment on the exact file
            and line using the create_inline_comment tool. Inline comments only attach
            to lines changed in this PR's diff, so for issues outside the diff, note
            them in the summary instead. Keep each comment to 1-3 sentences and include
            a concrete fix or a ```suggestion block where it helps. Finish with ONE short
            top-level summary: overall assessment + issue count by severity — don't repeat
            the detailed findings there.
